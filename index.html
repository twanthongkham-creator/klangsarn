<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemical Stock Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">🧪 Chemical Stock</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-side-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link active" href="index.html">จัดการสต็อก</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">แดชบอร์ด</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>รายการสารเคมีในระบบ</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#chemicalModal" onclick="openAddModal()">
                ➕ เพิ่มสารเคมีใหม่
            </button>
        </div>

        <div class="card shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>ชื่อสารเคมี</th>
                            <th>CAS No.</th>
                            <th>จำนวนคงเหลือ</th>
                            <th>วันผลิต (MFG)</th>
                            <th>วันหมดอายุ (EXP)</th>
                            <th>สถานที่เก็บ</th>
                            <th>จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="chemicalTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="chemicalModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">เพิ่มสารเคมี</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="chemicalForm">
                        <input type="hidden" id="chemicalId">
                        <div class="mb-3">
                            <label class="form-label">ชื่อสารเคมี</label>
                            <input type="text" class="form-control" id="chemicalName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">CAS Number</label>
                            <input type="text" class="form-control" id="casNumber">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">จำนวน</label>
                                <input type="number" step="0.01" class="form-control" id="quantity" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">หน่วยนับ</label>
                                <input type="text" class="form-control" id="unit" placeholder="เช่น kg, L" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">วันผลิต (MFG)</label>
                                <input type="date" class="form-control" id="mfgDate">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">วันหมดอายุ (EXP)</label>
                                <input type="date" class="form-control" id="expDate">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">สถานที่จัดเก็บ</label>
                            <input type="text" class="form-control" id="location">
                        </div>
                        <button type="submit" class="btn btn-success w-100">บันทึกข้อมูล</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
